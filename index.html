<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Power On Ⅲ">
    <title>PowerSlide Power On Ⅲ</title>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .mobile-only-menu {
            display: none; /* PCでは隠す */
        }

        /* 画面幅が768px以下（スマホ・縦向きタブレット）の時だけ発動するルール */
        @media (max-width: 768px) {
            /* 1. PC用の不要な左ナビやサイドバーをすべて消す */
            .nav-container,
            .sidebar, 
            #drag-handle,
            #windowHeader, 
            #fontControls {
                display: none !important;
            }

            /* 2. メイン画面を画面いっぱいに広げる */
            .app-container {
                flex-direction: column;
                height: 100vh;
                padding: 0;
            }
            .main-screen {
                width: 100% !important;
                height: 100vh !important;
                padding: 0 !important;
                border-radius: 0 !important;
            }
            
            /* スマホ時は常にメイン画面を開く状態にする */
            #mainOverlay {
                display: flex !important;
                flex-direction: column;
                height: 100%;
                width: 100%;
                background: #f4f7f6;
            }

            /* 3. スマホ専用トップメニューを表示する */
            .mobile-only-menu {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px;
                background: #4facfe;
                box-shadow: 0 2px 5px rgba(0,0,0,0.2);
                z-index: 100;
            }
            .mobile-only-menu select {
                padding: 8px;
                border-radius: 6px;
                border: none;
                font-weight: bold;
                color: #333;
                width: 48%; /* 押しやすいように少し広げる */
                font-size: 16px; /* スマホでのズーム防止 */
            }

            /* 4. 空白をなくし、音読画面を全画面に広げる */
            #targetTextDisplay {
                display: none !important; /* 空白の原因になっていた箱を消す */
            }
            
            #speechResultWindow {
                display: flex !important;
                height: 100% !important; /* 画面いっぱいに広げる */
                overflow-y: auto;
            }
            
            .transcription-container {
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                padding-bottom: 90px; /* 下のボタンが文字に被らないように余白を確保 */
            }

            .recognized-text {
                flex-grow: 1;
                margin-top: 0 !important;
                padding: 15px !important;
                border: none !important;
                border-radius: 0 !important;
                height: auto !important;
                font-size: 1.2rem !important; /* スマホでも見やすい文字サイズ */
                line-height: 1.6;
            }

            /* 5. マイクボタンを画面の一番下に固定する */
            #readingMicContainer, #shadowingMicContainer {
                position: fixed; 
                bottom: 20px; /* ★画面の一番下に配置 */
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;
                background: rgba(255,255,255,0.95);
                padding: 8px;
                border-radius: 50px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                display: flex !important;
            }
            
            /* シャドーイング用のマイクはスマホでは裏側に隠す */
            #shadowingMicContainer { display: none !important; }

            .start-record-btn {
                font-size: 1.2rem;
                padding: 15px 40px; /* 親指で押しやすいように大きく */
                font-weight: bold;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <button class="nav-btn color-blue active" onclick="selectLesson(1, this)">Lesson <span class="num">1</span></button>
        <button class="nav-btn color-orange" onclick="selectLesson(2, this)">Lesson <span class="num">2</span></button>
        <button class="nav-btn color-purple" onclick="selectLesson(3, this)">Lesson <span class="num">3</span></button>
        <button class="nav-btn color-green" onclick="selectLesson(4, this)">Lesson <span class="num">4</span></button>
        <button class="nav-btn color-pink" onclick="selectLesson(5, this)">Lesson <span class="num">5</span></button>
        <button class="nav-btn color-blue" onclick="selectLesson(6, this)">Lesson <span class="num">6</span></button>
        <button class="nav-btn color-orange" onclick="selectLesson(7, this)">Lesson <span class="num">7</span></button>
        <button class="nav-btn color-purple" onclick="selectLesson(8, this)">Lesson <span class="num">8</span></button>
        <button class="nav-btn color-green" onclick="selectLesson(9, this)">Lesson <span class="num">9</span></button>
        <button class="nav-btn color-pink" onclick="selectLesson(10, this)">Lesson <span class="num">10</span></button>
    </div>

    <div class="app-container" id="appContainer">
        <div class="main-screen" id="mainScreen">
            
            <div id="mainOverlay">
                <div id="mobileTopMenu" class="mobile-only-menu">
                    <select id="mobileLessonSelect" onchange="if(typeof changeScopeMobile === 'function') changeScopeMobile()">
                        <option value="L01">Lesson 1</option>
                        <option value="L02">Lesson 2</option>
                        <option value="L03">Lesson 3</option>
                        <option value="L04">Lesson 4</option>
                        <option value="L05">Lesson 5</option>
                        <option value="L06">Lesson 6</option>
                        <option value="L07">Lesson 7</option>
                        <option value="L08">Lesson 8</option>
                        <option value="L09">Lesson 9</option>
                        <option value="L10">Lesson 10</option>
                    </select>
                    <select id="mobilePartSelect" onchange="if(typeof changeScopeMobile === 'function') changeScopeMobile()">
                        <option value="p1">Part 1</option>
                        <option value="p2">Part 2</option>
                        <option value="p3">Part 3</option>
                        <option value="p4">Part 4</option>
                        <option value="full">Full Text</option>
                    </select>
                </div>
                <div class="overlay-header" id="windowHeader" style="display:flex; justify-content:space-between; align-items:center; width:100%; padding-bottom: 5px; margin-bottom: 5px; border-bottom: none;">
                    <span class="overlay-title" id="overlayTitle" style="margin:0; font-weight:900; color:#333; font-size:1.2rem;"></span>
                </div>
                <div id="fontControls" style="display:none; justify-content:flex-end; width:100%; margin-bottom:10px; gap: 15px;">
                    <div style="display:none; align-items:center; gap: 8px;" id="engFontControl">
                        <button class="font-size-btn" onclick="changeFontSize('eng', -2)" style="padding:4px 12px; border:1px solid #ddd; border-radius:6px; background:#fff; color:#333; font-weight:bold; cursor:pointer; font-size:14px; box-shadow:0 1px 2px rgba(0,0,0,0.1);">A -</button>
                        <button class="font-size-btn" onclick="changeFontSize('eng', 2)" style="padding:4px 12px; border:1px solid #ddd; border-radius:6px; background:#fff; color:#333; font-weight:bold; cursor:pointer; font-size:14px; box-shadow:0 1px 2px rgba(0,0,0,0.1);">A +</button>
                    </div>
                    <div style="display:none; align-items:center; gap: 8px;" id="jpnFontControl">
                        <button class="font-size-btn" onclick="changeFontSize('jpn', -2)" style="padding:4px 12px; border:1px solid #ddd; border-radius:6px; background:#fff; color:#333; font-weight:bold; cursor:pointer; font-size:14px; box-shadow:0 1px 2px rgba(0,0,0,0.1);">A -</button>
                        <button class="font-size-btn" onclick="changeFontSize('jpn', 2)" style="padding:4px 12px; border:1px solid #ddd; border-radius:6px; background:#fff; color:#333; font-weight:bold; cursor:pointer; font-size:14px; box-shadow:0 1px 2px rgba(0,0,0,0.1);">A +</button>
                    </div>
                    <div style="display:none; align-items:center; gap: 8px;" id="recFontControl">
                        <span style="font-size:0.9rem; font-weight:bold; color:#ff007f;">文字サイズ:</span>
                        <button class="font-size-btn" onclick="changeFontSize('rec', -2)" style="padding:4px 12px; border:1px solid #ffcdd2; border-radius:6px; background:#ffebee; color:#c62828; font-weight:bold; cursor:pointer; font-size:14px; box-shadow:0 1px 2px rgba(0,0,0,0.1);">A -</button>
                        <button class="font-size-btn" onclick="changeFontSize('rec', 2)" style="padding:4px 12px; border:1px solid #ffcdd2; border-radius:6px; background:#ffebee; color:#c62828; font-weight:bold; cursor:pointer; font-size:14px; box-shadow:0 1px 2px rgba(0,0,0,0.1);">A +</button>
                    </div>
                </div>

                <div class="target-text-display sns-box" id="targetTextDisplay" style="display: none;">※データがありません</div>

                <div id="speechResultWindow" style="display:none; flex-grow: 1; flex-direction: column; width: 100%; height: 100%;">
                    <div id="gameHud" class="game-hud">
                        <div class="hud-badge hud-acc">
                            <span class="hud-title">ACCURACY</span>
                            <span class="hud-value" id="hudAccValue">0<span style="font-size:1rem;">%</span></span>
                        </div>
                        <div class="hud-badge hud-wpm">
                            <span class="hud-title">WPM</span>
                            <span class="hud-value" id="hudWpmValue">0</span>
                        </div>
                        <div style="margin-left:auto; color:#fff; font-size:0.8rem; opacity:0.8;">※読めた単語は<span style="color:#4facfe; font-weight:bold;">青色</span></div>
                    </div>
                    
                    <div class="transcription-container">
                        <div class="recognized-text sns-box-large" id="recognizedTextDisplay"></div>
                        
                        <div id="readingMicContainer" style="display:none;">
                            <button class="start-record-btn floating-btn" id="micBtn" onclick="toggleReadingRecording()">START</button>
                        </div>
                        <div id="shadowingMicContainer" style="display:none;">
                            <button class="start-record-btn floating-btn" id="bigShadowBtn" onclick="startShadowing()">START</button>
                            <button class="start-record-btn floating-btn stop-floating-btn" id="stopShadowBtn" onclick="stopShadowing()" style="display:none;">FINISH</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="vocabPopup" style="display:none;">
                <div class="popup-word" id="popupWord">Word</div>
                <div class="popup-pron" id="popupPron">/pron/</div>
                <div class="popup-mean" id="popupMean">意味</div>
                <div class="popup-recognized" id="popupRecognized">認識: </div>
                <div class="popup-controls">
                    <button class="popup-mic-btn" id="popupMicBtn" onclick="togglePopupMic()">🎤</button>
                    <button class="popup-close" onclick="closeVocabPopup()">閉じる</button>
                </div>
            </div>
        </div>

        <div id="drag-handle"></div>

        <div class="sidebar compact-sidebar" id="sidebar">
            <div class="sidebar-group">
                <div class="selector-container">
                    <select id="partSelect" onchange="onScopeChange()"><option value="1">Part 1</option><option value="2">Part 2</option><option value="3">Part 3</option><option value="4">Part 4</option></select>
                    <select id="paraSelect" onchange="onScopeChange()"><option value="full">Full Text</option><option value="p1">Paragraph 1</option><option value="p2">Paragraph 2</option><option value="p3">Paragraph 3</option></select>
                </div>
                <button class="btn btn-audio-main compact-main-btn" id="btnMainAudio" onclick="toggleMainAudio()">▶ Play Audio</button>
                <div class="audio-controls compact-ctrls">
                    <button class="ctrl-btn" onclick="seekAudio(-5)">⏪ 5s</button>
                    <button class="ctrl-btn" onclick="stopAudio()">⏹ Stop</button>
                    <button class="ctrl-btn" onclick="seekAudio(5)">5s ⏩</button>
                </div>
                <div class="loop-controls compact-ctrls">
                    <button id="btn-loop-start" class="loop-btn" onclick="setLoopStart()">Start</button>
                    <button id="btn-loop-end" class="loop-btn" onclick="setLoopEnd()">End</button>
                    <button class="loop-btn" onclick="clearLoop()">Clear</button>
                </div>
            </div>
            <hr style="margin: 5px 0;">
           <div class="sidebar-group right-controls">
                <div style="margin-bottom: 10px;">
                    <select id="levelSelect" onchange="changeLevel(this.value)" style="width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #4facfe; font-weight: bold; color: #0288d1; background: #e1f5fe; cursor: pointer; outline: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 0.95rem;">
                        <option value="standard">🔰 Standard (標準)</option>
                        <option value="pre1">🎯 英検準1級レベル</option>
                        <option value="grade1">👑 英検1級レベル</option>
                    </select>
                </div>

                <button class="btn btn-script stylish-btn" onclick="toggleTextMode('script')" id="btnScript">
                    <span class="main-txt">Script</span><span class="sub-txt">本文を表示</span>
                </button>
                <button class="btn btn-japanese stylish-btn" onclick="toggleTextMode('japanese')" id="btnJapanese">
                    <span class="main-txt">Japanese</span><span class="sub-txt">日本語訳を表示</span>
                </button>
                <button class="btn btn-vocab stylish-btn" onclick="startVocabQuiz()">
                    <span class="main-txt" style="margin-top:6px;">Vocabulary</span>
                </button>
                <hr style="margin: 5px 0;">
                <button class="btn btn-compre stylish-btn" onclick="openSpeechOverlay('reading')">
                    <span class="main-txt">Reading Check</span><span class="sub-txt">音読練習</span>
                </button>
                <button class="btn btn-shadowing stylish-btn" onclick="openSpeechOverlay('shadowing')">
                    <span class="main-txt">Shadowing</span><span class="sub-txt">シャドーイング</span>
                </button>
                <button class="btn btn-clear stylish-btn" onclick="resetAppMode()">
                    <span class="main-txt" style="margin-top:6px;">ALL CLEAR</span>
                </button>
            </div>
        </div>
    </div>

   <div id="submitModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:30px; border-radius:12px; width:90%; max-width:400px; box-shadow:0 4px 15px rgba(0,0,0,0.2); text-align:center;">
            <h3 style="margin-top:0; color:#333;">📤 成績の提出</h3>
            <p style="font-size:0.9rem; color:#666; margin-bottom:10px;">ベストスコアを先生に送信します。</p>
            
            <div style="background:#fff9c4; padding:8px; border-radius:6px; margin-bottom:15px; font-size:0.9rem; font-weight:bold; color:#f57f17;">
                📍 練習範囲: <span id="submitScopeDisplay">未取得</span>
            </div>
            
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="studentClass" placeholder="クラス (例: 1A)" style="width:50%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:16px;">
                <input type="number" id="studentNumber" placeholder="出席番号" style="width:50%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:16px;">
            </div>
            <input type="text" id="studentName" placeholder="氏名 (フルネーム)" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:16px; margin-bottom:20px; box-sizing:border-box;">
            
            <div style="background:#f0f8ff; padding:15px; border-radius:8px; margin-bottom:20px;">
                <div style="font-weight:bold; color:#0288d1; margin-bottom:5px;">送信するデータ</div>
                <div style="display:flex; justify-content:space-around; font-size:1.2rem; font-weight:900; color:#333;">
                    <div>Accuracy: <span id="submitAcc">0</span>%</div>
                    <div>WPM: <span id="submitWpm">0</span></div>
                </div>
            </div>

            <div style="display:flex; gap:10px;">
                <button onclick="document.getElementById('submitModal').style.display='none'" style="flex:1; padding:12px; border:none; border-radius:6px; background:#e0e0e0; color:#333; font-weight:bold; cursor:pointer;">キャンセル</button>
                <button onclick="sendScoreToGAS()" id="finalSubmitBtn" style="flex:2; padding:12px; border:none; border-radius:6px; background:#4caf50; color:#fff; font-weight:bold; cursor:pointer;">このスコアで送信する</button>
            </div>
        </div>
    </div>

    <button id="floatingSubmitBtn" onclick="openSubmitModal()" style="display:none; position:fixed; bottom:20px; right:20px; background:#ff4081; color:white; border:none; border-radius:50px; padding:15px 25px; font-size:1.1rem; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.3); cursor:pointer; z-index:1000; transition:transform 0.2s;">
        📤 この成績を提出
    </button>

   <audio id="mainAudioPlayer"></audio>
    <audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
   
    <script src="lessons/lessonData.js"></script>
    <script src="js/state.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
    <script src="js/speech.js"></script>
</body>
</html>
